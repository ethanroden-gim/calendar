<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="1800" /><!-- reload every 30 min so the board stays current -->
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>GIM Maintenance Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gim-green: #7ac142;
      --gim-black: #111111;
      --gim-white: #ffffff;
      --card: #1c1c1c;
      --muted: #c2c2c2;
      --gim-tan: #c9b79c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Copperplate Gothic Light", "Copperplate", "Copperplate Gothic", Georgia, serif;
      background: var(--gim-black);
      color: var(--gim-white);
      height: 100vh;
      overflow: hidden;            /* kiosk: no page scroll */
      padding: 2.5vh 2.5vw;        /* TV overscan safe area */
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    header {
      width: 100%;
      background: var(--gim-black);
      border-bottom: 4px solid var(--gim-green);
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      font-family: "Alfa Slab One", cursive;
      color: var(--gim-green);
      font-size: clamp(2rem, 3.4vw, 4rem);
      letter-spacing: 1px;
    }
    main {
      width: 100%;
      max-width: none;
      flex: 1 1 auto;
      min-height: 0;               /* lets the grid actually fill/shrink */
      padding: 1rem;
      display: flex;
    }
    /* ---- calendar grid ---- */
    .cal-scroll {
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr;
      grid-template-rows: auto repeat(var(--week-rows, 3), 1fr);
      gap: 6px;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
    }
    .cal-head {
      text-align: center;
      font-size: clamp(0.85rem, 1.15vw, 1.4rem);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gim-green);
      padding: 0.35rem 0 0.5rem;
    }
    .cal-head.weekend { color: var(--muted); }
    .cal-cell {
      background: var(--card);
      border-radius: 6px;
      padding: 0.5rem 0.6rem;
      border: 2px solid #2e2e2e;
      min-height: 0;
      min-width: 0;                /* let cells shrink to their column so text can wrap */
      display: flex;
      flex-direction: column;
      overflow: hidden;            /* clip rare busy-day overflow rather than break fill-height */
    }
    .cal-cell.weekend { background: #242424; }
    .cal-cell.past { opacity: 0.72; }
    .cal-cell.today {
      border-color: var(--gim-green);
      box-shadow: inset 0 0 0 3px var(--gim-green);
      background: #20271a;
    }
    .cal-daynum { font-size: clamp(0.85rem, 1.1vw, 1.35rem); color: var(--muted); margin-bottom: 0.35rem; }
    .cal-cell.today .cal-daynum { color: var(--gim-green); font-weight: bold; }
    .chip {
      display: block;
      font-size: clamp(0.8rem, 1.0vw, 1.2rem);
      line-height: 1.25;
      border-radius: 3px;
      padding: 3px 7px;
      margin-bottom: 4px;
      overflow-wrap: anywhere;     /* wrap long words instead of clipping them */
    }
    .chip.maintenance { background: #243a16; border-left: 4px solid var(--gim-green); }
    .chip.holiday { background: #3a3326; border-left: 4px solid var(--gim-tan); }
    .chip-time {
      display: block;
      font-size: clamp(0.72rem, 0.85vw, 1.05rem);
      color: var(--gim-green);
      font-variant-numeric: tabular-nums;
    }
    .chip.holiday .chip-time { color: var(--gim-tan); }
    .chip-title { display: block; font-size: clamp(0.85rem, 1.0vw, 1.25rem); font-weight: bold; color: #ffffff; }
    .chip-loc { display: block; font-size: clamp(0.7rem, 0.8vw, 1.0rem); color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>GIM Maintenance Schedule</h1>
  </header>
  <main>
    {{GRID}}
  </main>
</body>
</html>
